strictness: medium
test-warnings: true
doc-warnings: false

ignore-paths:
  - docs
  - build

ignore-patterns:
  - (^|/)skip(this)?(/|$)

pylint:
  disable:
#    - too-many-locals
#    - too-many-branches
    - too-many-positional-arguments
    - too-many-arguments

mccabe:
  run: false

mypy:
  run: true
